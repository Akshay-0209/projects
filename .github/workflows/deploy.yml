name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Use Node.js from .nvmrc if available, else 18
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Build project (if applicable)
        run: |
          if [ -f package.json ] && jq -e '.scripts.build' package.json > /dev/null; then
            npm run build
          else
            echo "No build script defined, skipping build."
          fi
      - name: Deploy to production (placeholder)
        run: |
          echo 'Deploy to production goes here'
          # TODO: Replace the above line with actual deployment commands, e.g.,
          # scp, rsync, kubectl, aws, etc.
