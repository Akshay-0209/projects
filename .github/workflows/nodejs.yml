name: Node.js CI
on:
  push:
    branches: [ main, feat/scaffold ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test || echo "No tests yet"
      - run: npm run build || echo "No build script"
      - run: npm pkg set scripts.prepare="echo generate lockfile" && npm install --package-lock-only